<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>💰 Expense Tracker</h1>

<!-- Summary Cards -->
<div class="cards">
    <div class="card balance">
        <h3>Total Balance</h3>
        <p>₹10,000</p>
    </div>

    <div class="card income">
        <h3>Income</h3>
        <p>₹15,000</p>
    </div>

    <div class="card expense">
        <h3>Expense</h3>
        <p>₹5,000</p>
    </div>
</div>

<!-- Transaction List -->
<h2>Transactions</h2>

<table>
    <tr>
        <th>Description</th>
        <th>Amount</th>
        <th>Type</th>
    </tr>

    <tr>
        <td>Salary</td>
        <td>₹10,000</td>
        <td class="income-text">Income</td>
    </tr>

    <tr>
        <td>Shopping</td>
        <td>₹2,000</td>
        <td class="expense-text">Expense</td>
    </tr>

</table>

</body>
</html>
